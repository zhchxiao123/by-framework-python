name: Publish Packages

on:
  push:
    tags:
      - "by-framework-v*"
      - "by-framework-history-postgres-v*"
      - "by-framework-history-byclaw-v*"
      - "by-framework-trace-langfuse-v*"
      - "by-framework-trace-phoenix-v*"
      - "by-framework-langgraph-v*"
      - "by-framework-adk-v*"

permissions:
  contents: read

jobs:
  resolve-package:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.resolve.outputs.package_name }}
      package_dir: ${{ steps.resolve.outputs.package_dir }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve package from tag
        id: resolve
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            by-framework-v*)
              echo "package_name=by-framework" >> "$GITHUB_OUTPUT"
              echo "package_dir=." >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-history-postgres-v*)
              echo "package_name=by-framework-history-postgres" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-history-postgres" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-history-postgres-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-history-byclaw-v*)
              echo "package_name=by-framework-history-byclaw" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-history-byclaw" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-history-byclaw-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-trace-langfuse-v*)
              echo "package_name=by-framework-trace-langfuse" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-trace-langfuse" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-trace-langfuse-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-trace-phoenix-v*)
              echo "package_name=by-framework-trace-phoenix" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-trace-phoenix" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-trace-phoenix-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-langgraph-v*)
              echo "package_name=by-framework-langgraph" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-langgraph" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-langgraph-v}" >> "$GITHUB_OUTPUT"
              ;;
            by-framework-adk-v*)
              echo "package_name=by-framework-adk" >> "$GITHUB_OUTPUT"
              echo "package_dir=libs/by-framework-adk" >> "$GITHUB_OUTPUT"
              echo "version=${REF_NAME#by-framework-adk-v}" >> "$GITHUB_OUTPUT"
              ;;              
            *)
              echo "Unsupported tag: $REF_NAME" >&2
              exit 1
              ;;
          esac

  build:
    runs-on: ubuntu-latest
    needs: resolve-package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync workspace dependencies
        run: make install
      - name: Verify tag version matches package metadata
        env:
          PACKAGE_DIR: ${{ needs.resolve-package.outputs.package_dir }}
          EXPECTED_VERSION: ${{ needs.resolve-package.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          import os

          package_dir = Path(os.environ["PACKAGE_DIR"])
          expected_version = os.environ["EXPECTED_VERSION"]
          pyproject = tomllib.loads((package_dir / "pyproject.toml").read_text(encoding="utf-8"))
          actual_version = pyproject["project"]["version"]
          if actual_version != expected_version:
              raise SystemExit(
                  f"Tag version {expected_version!r} does not match pyproject version {actual_version!r}"
              )
          PY
      - name: Run package tests via Makefile
        env:
          PACKAGE_DIR: ${{ needs.resolve-package.outputs.package_dir }}
        run: |
          if [ "$PACKAGE_DIR" = "." ]; then
            make test PROJECTS='.'
          else
            make test PROJECTS="$PACKAGE_DIR"
          fi
      - name: Build distributions
        env:
          PACKAGE_DIR: ${{ needs.resolve-package.outputs.package_dir }}
        run: |
          uv build --project "$PACKAGE_DIR" --out-dir "$PACKAGE_DIR/dist"
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-package.outputs.package_name }}-dist
          path: ${{ needs.resolve-package.outputs.package_dir }}/dist/

  publish:
    runs-on: ubuntu-latest
    needs:
      - resolve-package
      - build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.resolve-package.outputs.package_name }}/${{ needs.resolve-package.outputs.version }}/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve-package.outputs.package_name }}-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
